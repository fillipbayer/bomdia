app = "daily-board"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"
  HOST = "0.0.0.0"
  PORT = "4173"
  OWNER_NAME = "Oto"
  TIMEZONE = "America/Sao_Paulo"
  TTS_PROVIDER = "elevenlabs"
  OPENAI_TTS_MODEL = "gpt-4o-mini-tts"
  OPENAI_TTS_VOICE = "marin"
  ELEVENLABS_MODEL = "eleven_multilingual_v2"
  ELEVENLABS_VOICE_ID = "JBFqnCBsd6RMkjVDRZzb"
  TTS_RESPONSE_FORMAT = "mp3_44100_128"
  TTS_INSTRUCTIONS = "Fale em portugues brasileiro, como apresentador de podcast matinal premium, natural, calmo e inteligente."

[[mounts]]
  source = "daily_board_data"
  destination = "/data"

[http_service]
  internal_port = 4173
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/api/health"
