services:
  - type: web
    name: daily-board
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: OWNER_NAME
        value: Oto
      - key: TIMEZONE
        value: America/Sao_Paulo
      - key: TTS_PROVIDER
        value: elevenlabs
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: marin
      - key: ELEVENLABS_MODEL
        value: eleven_multilingual_v2
      - key: ELEVENLABS_VOICE_ID
        value: JBFqnCBsd6RMkjVDRZzb
      - key: TTS_RESPONSE_FORMAT
        value: mp3_44100_128
      - key: TTS_INSTRUCTIONS
        value: Fale em portugues brasileiro, como apresentador de podcast matinal premium, natural, calmo e inteligente.
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
    disk:
      name: daily-board-data
      mountPath: /data
      sizeGB: 1
